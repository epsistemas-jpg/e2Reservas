<!DOCTYPE html>
<html lang="es">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />

<meta http-equiv="Pragma" content="no-cache" />

<meta http-equiv="Expires" content="0" />

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Calendario de Reservas</title>

  <!-- GOOGLE FONTS -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->

  <link rel="stylesheet" href="../css/global.css">

  <link rel="stylesheet" href="../css/dashboard.css">

  <link rel="stylesheet" href="../css/components/sidebar.css">

  <link rel="stylesheet" href="../css/components/buttons.css">

  <link rel="stylesheet" href="../css/components/cards.css">

  <link rel="stylesheet" href="../css/components/topbar.css">

  <link rel="stylesheet" href="../css/components/modal.css">

  <link rel="stylesheet" href="../css/components/activity.css">

  <link rel="stylesheet" href="../css/components/toast.css">


  <!-- FULLCALENDAR -->

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>


</head>

<body>


  <div class="dashboard-layout">

    <!-- SIDEBAR -->

    <aside class="sidebar">

      <div class="sidebar-top">

        <div class="sidebar-logo">

          <img src="/images/logo-E2.png" alt="E2 Energía" class="sidebar-logo-img" />

        </div>

        <nav class="sidebar-menu">

          <nav class="sidebar-menu">

            <a href="#" class="active" id="dashboardMenu">
              <i class="fa-solid fa-table-columns"></i>
              <span>Dashboard</span>
            </a>

            <a href="#" id="reserveMenu">
              <i class="fa-solid fa-calendar-plus"></i>
              <span>Reservar Sala</span>
            </a>

            <a href="#" id="myReservationsMenu">
              <i class="fa-solid fa-calendar-check"></i>
              <span>Mis Reservas</span>
            </a>

            <a href="#" id="historyMenu">
              <i class="fa-solid fa-clock-rotate-left"></i>
              <span>Historial</span>
            </a>

            <a href="#" id="settingsMenu">
              <i class="fa-solid fa-gear"></i>
              <span>Configuración</span>
            </a>

          </nav>

        </nav>

      </div>
      <div class="sidebar-user">

        <div class="sidebar-user-top">

          <div class="sidebar-avatar" id="sidebarAvatar">

            UD

          </div>

          <div class="sidebar-user-info">

            <strong id="sidebarUserName">

              Usuario

            </strong>

            <p id="sidebarUserRole">
              Usuario
            </p>

          </div>

        </div>

        <button class="logout-btn" id="logoutBtn">

          <i class="fa-solid fa-right-from-bracket"></i>

          Cerrar sesión

        </button>

      </div>

    </aside>

    <!-- MAIN -->

    <main class="main-content">

      <header>
        <button class="menu-toggle" id="menuToggle">

          <i class="fa-solid fa-bars"></i>

        </button>
        <div class="topbar">

          <p id="welcomeMessage">
            Bienvenido, Usuario
          </p>

        </div>
        <div class="topbar-right">

          <button id="themeToggle">

            <i class="fa-solid fa-moon"></i>

          </button>

          <button id="openModal">

            Nueva Reserva

          </button>

          <div class="search-box">

            <input type="text" placeholder="Buscar reservas...">

          </div>

          <div class="user-profile">

            <div class="user-info">
              <strong id="topbarUserName">

                Usuario

              </strong>

              <p id="topbarUserRole">
                Usuario
              </p>

            </div>

            <div class="user-avatar" id="userAvatar">

              UD

            </div>

          </div>

        </div>





      </header>

      <!-- CALENDARIO -->

      <div class="calendar-filters">

        <div class="filter-group">

          <label>Sala</label>

          <select id="roomFilter">

            <option value="all">
              Todas las salas
            </option>

            <option value="Rio Magdalena">
              Rio Magdalena
            </option>

            <option value="Bocas de ceniza">
              Bocas de ceniza
            </option>

            <option value="Piso 1109">
              Piso 1109
            </option>

          </select>

        </div>

        <div class="filter-group">

          <label>Vista</label>

          <select id="calendarView">

            <option value="dayGridMonth">
              Mes
            </option>

            <option value="timeGridWeek">
              Semana
            </option>

            <option value="timeGridDay">
              Día
            </option>

          </select>

        </div>

      </div>

      <div class="stats-grid">

        <div class="calendar-full-container">

          <div class="calendar-wrapper expanded-calendar">

            <div class="calendar-skeleton" id="calendarSkeleton">

              <div class="skeleton-header"></div>

              <div class="skeleton-grid">

                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>

              </div>

            </div>

            <div id="calendar" style="display:none;"></div>

          </div>

        </div>

      </div>

  </div>

  </aside>

  </div>
  </aside>

  </div>

  </main>

  </div>

  <!-- TOOLTIP -->

  <div id="tooltip" class="fc-tooltip"></div>

  <div class="modal-overlay" id="reservationModal">

    <div class="modal">

      <div class="modal-header">

        <h2>Nueva Reserva</h2>

        <button class="close-modal" id="closeModal">
          ✕
        </button>

      </div>

      <form class="modal-form" id="reservationForm">

        <div class="form-group">

          <label>
            Sala de Reunión
          </label>

          <select id="room" name="room" required>

            <option value="">
              Seleccionar sala
            </option>

            <option value="Rio Magdalena">
              Rio Magdalena
            </option>

            <option value="Bocas de ceniza">
              Bocas de ceniza
            </option>

            <option value="Piso 1109">
              Piso 1109
            </option>

          </select>

        </div>

        <div class="form-group">

          <label>
            Fecha
          </label>

          <input type="date" id="date" name="date" required>

        </div>

        <div class="form-row">

          <div class="form-group">

            <label>
              Hora Inicio
            </label>

            <input type="time" id="start_time" name="start_time" required>

          </div>

          <div class="form-group">

            <label>
              Hora Fin
            </label>

            <input type="time" id="end_time" name="end_time" required>

          </div>

        </div>

        <div class="form-group">

          <label>
            Motivo de la reserva
          </label>

          <textarea rows="5" id="motivo" name="motivo" placeholder="Describe el propósito de la reunión..."
            required></textarea>

        </div>

        <button type="submit" class="submit-btn">

          Crear Reserva

        </button>
        <button type="button" id="deleteReservation" class="delete-btn" style="display:none;">
          Eliminar Reserva
        </button>

      </form>

    </div>

  </div>

  <div class="toast-container" id="toastContainer"></div>


  </div>

  <div id="toastContainer"></div>

  <!-- =========================
     SETTINGS MODAL
========================= -->

  <div class="modal-overlay" id="settingsModal">

    <div class="modal settings-modal">

      <div class="modal-header">

        <h2>
          Configuración
        </h2>

        <button class="close-modal" id="closeSettingsModal">
          ✕
        </button>

      </div>

      <div class="settings-content">

        <div class="settings-section">

          <div class="settings-user">

            <div class="settings-avatar" id="settingsAvatar">
              UD
            </div>

            <div>

              <strong id="settingsUserName">
                Usuario
              </strong>

              <p id="settingsUserRole">
                Usuario
              </p>

            </div>

          </div>

        </div>

        <div class="settings-section">

          <h3>
            Apariencia
          </h3>

          <button class="settings-btn" id="toggleThemeSettings">

            Cambiar tema

          </button>

        </div>

        <div class="settings-section">

          <h3>
            Sesión
          </h3>

          <button class="logout-btn" id="logoutBtn">

            Cerrar Sesión

          </button>

        </div>

      </div>

    </div>

  </div>
  <div class="confirm-modal" id="confirmModal">

    <div class="confirm-box">

      <h3>
        Eliminar Reserva
      </h3>

      <p>
        ¿Seguro que deseas eliminar esta reserva?
      </p>

      <div class="confirm-actions">

        <button id="cancelDelete" class="cancel-btn">
          Cancelar
        </button>

        <button id="confirmDelete" class="confirm-delete-btn">
          Eliminar
        </button>

      </div>

    </div>

  </div>

  <script src="../js/ui.js"></script>

  <script src="../js/components/sidebar.js"></script>

  <script src="../js/settings.js"></script>

  <script src="../js/components/calendar.js"></script>

  <script src="../js/dashboard.js"></script>

</body>


</html>
