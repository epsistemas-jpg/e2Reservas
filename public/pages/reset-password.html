<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Restablecer contraseña</title>

    <link rel="icon" type="image/x-icon" href="/images/icon/e2.ico">

    <link rel="stylesheet" href="../css/login.css">

</head>

<body>

<main class="login-wrapper">

    <section class="auth-panel">

        <div class="auth-card">

            <div class="login-logo">

                <img src="/images/logo-E2.png" class="company-logo">

            </div>

            <h2 style="color:#111;text-align:center;margin-bottom:25px;">

                Restablecer contraseña

            </h2>

            <form id="resetForm">

                <div class="input-group">

                    <label>Nueva contraseña</label>

                    <div class="input-box">

                        <input
                            type="password"
                            id="password"
                            required
                            placeholder="Nueva contraseña">

                    </div>

                </div>

                <div class="input-group">

                    <label>Confirmar contraseña</label>

                    <div class="input-box">

                        <input
                            type="password"
                            id="confirmPassword"
                            required
                            placeholder="Confirmar contraseña">

                    </div>

                </div>

                <button
                    class="main-btn"
                    type="submit">

                    Cambiar contraseña

                </button>

            </form>

        </div>

    </section>

</main>

<script type="module" src="../js/reset-password.js"></script>

</body>

</html>
